{{- if and .Values.backups.enabled (eq .Values.backups.provider "google") (not .Values.backups.google.gkeEnvironment) .Values.backups.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-backup-google-creds" (include "cluster.fullname" .)) .Values.backups.secret.name }}
  namespace: {{ include "cluster.namespace" . }}
data:
  APPLICATION_CREDENTIALS: {{ required ".Values.backups.google.applicationCredentials is required when gkeEnvironment is false." .Values.backups.google.applicationCredentials | b64enc | quote }}
{{- end }}
