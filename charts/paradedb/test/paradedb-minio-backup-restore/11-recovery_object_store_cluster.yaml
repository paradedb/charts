##
# Recovery directly from the barman object store (no CNPG Backup object): the
# cluster bootstraps from the source cluster's archive under serverName
# `paradedb` and replays all archived WAL.
type: paradedb
mode: recovery
cluster:
  instances: 2
  storage:
    size: 256Mi

recovery:
  method: object_store
  # serverName of the source cluster, i.e. its name in the object store.
  clusterName: "paradedb"
  provider: s3
  endpointURL: "https://minio.minio.svc.cluster.local"
  endpointCA:
    name: kube-root-ca.crt
    key: ca.crt
  wal:
    encryption: ""
  data:
    encryption: ""
  s3:
    bucket: "mybucket"
    path: "/paradedb/v1"
    accessKey: "minio"
    secretKey: "minio123"
    region: "local"
  scheduledBackups: []
  retentionPolicy: "30d"

backups:
  enabled: true
  provider: s3
  endpointURL: "https://minio.minio.svc.cluster.local"
  endpointCA:
    name: kube-root-ca.crt
    key: ca.crt
  wal:
    encryption: ""
  data:
    encryption: ""
  s3:
    bucket: "mybucket"
    path: "/paradedb/v2"
    accessKey: "minio"
    secretKey: "minio123"
    region: "local"
  scheduledBackups: []
  retentionPolicy: "30d"
