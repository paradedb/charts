##
# This test sets up a ParadeDB CNPG Cluster with MinIO backups and ensures that ParadeDB extensions are installed and
# PITR recovery is enabled and working.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: paradedb
spec:
  timeouts:
    apply: 1s
    assert: 8m
    cleanup: 1m
  steps:
    - name: Clear the MinIO bucket
      try:
        - apply:
            file: ./00-minio_cleanup.yaml
        - assert:
            file: ./00-minio_cleanup-assert.yaml
    - name: Install a standalone ParadeDB CNPG Cluster
      try:
        - script:
            content: |
              kubectl -n $NAMESPACE create secret generic kube-root-ca.crt --from-literal=ca.crt="$(kubectl -n kube-system get configmaps kube-root-ca.crt -o jsonpath='{.data.ca\.crt}')" --dry-run=client -o yaml | kubectl apply -f -
              helm upgrade \
                --install \
                --namespace $NAMESPACE \
                --values ./01-paradedb_cluster.yaml \
                --wait \
                paradedb ../../
        - assert:
            file: ./01-paradedb_cluster-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
        - podLogs:
            selector: cnpg.io/cluster=paradedb-paradedb
    - name: Initialize with ParadeDB sample data
      timeouts:
        apply: 1s
        assert: 10s
      try:
        - apply:
            file: ./02-paradedb_write.yaml
        - assert:
            file: ./02-paradedb_write-assert.yaml
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
        - podLogs:
            selector: batch.kubernetes.io/job-name=data-write
    - name: Verify ParadeDB extensions are installed
      timeouts:
        apply: 1s
        assert: 30s
      try:
        - apply:
            file: 03-paradedb_test.yaml
        - assert:
            file: 03-paradedb_test-assert.yaml
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
        - podLogs:
            selector: batch.kubernetes.io/job-name=paradedb-test
    - name: Write some data to the cluster
      timeouts:
        apply: 1s
        assert: 30s
      try:
        - apply:
            file: 04-data_write.yaml
        - assert:
            file: 04-data_write-assert.yaml
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
        - podLogs:
            selector: batch.kubernetes.io/job-name=data-write
    - name: Start a backup
      try:
        - apply:
            file: ./05-backup.yaml
        - assert:
            file: ./05-backup_running-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Backup
        - podLogs:
            selector: cnpg.io/cluster=paradedb
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
        - podLogs:
            selector: cnpg.io/cluster=paradedb-paradedb
    - name: Complete a backup
      try:
        - apply:
            file: ./05-checkpoint.yaml
        - assert:
            file: ./05-backup_completed-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Backup
        - podLogs:
            selector: cnpg.io/cluster=paradedb
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
        - podLogs:
            selector: cnpg.io/cluster=paradedb-paradedb
    - name: Write more data to the database after the backup
      try:
        - apply:
            file: ./06-post_backup_data_write.yaml
        - assert:
            file: ./06-post_backup_data_write-assert.yaml
      timeouts:
        apply: 1s
        assert: 10m
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Backup
    - name: Create a recovery cluster from backup with a PITR target
      try:
        - script:
            content: |
              DATE_NO_BAD_TABLE=$(kubectl -n $NAMESPACE get configmap date-no-bad-table -o 'jsonpath={.data.date}')
              helm upgrade \
                --install \
                --namespace $NAMESPACE \
                --values ./07-recovery_backup_pitr_cluster.yaml \
                --set recovery.pitrTarget.time="$DATE_NO_BAD_TABLE" \
                --wait \
                recovery-backup-pitr ../../
        - assert:
            file: ./07-recovery_backup_pitr_cluster-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
        - podLogs:
            selector: cnpg.io/cluster=recovery-backup-pitr-paradedb
    - name: Verify the pre-backup data on the recovery cluster exists but not the post-backup data
      try:
        - apply:
            file: 08-data_test.yaml
        - assert:
            file: 08-data_test-assert.yaml
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
            name: data-test-backup-pitr
        - podLogs:
            selector: batch.kubernetes.io/job-name=data-test-backup-pitr
    - name: Create a recovery cluster from a backup
      try:
        - script:
            content: |
              helm upgrade \
                --install \
                --namespace $NAMESPACE \
                --values ./09-recovery_backup_cluster.yaml \
                --wait \
                recovery-backup ../../
        - assert:
            file: ./09-recovery_backup_cluster-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
        - podLogs:
            selector: cnpg.io/cluster=recovery-backup-paradedb
    - name: Verify the data on the backup recovery cluster exists
      try:
        - apply:
            file: 10-data_test.yaml
        - assert:
            file: 10-data_test-assert.yaml
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
            name: data-test-backup
        - podLogs:
            selector: batch.kubernetes.io/job-name=data-test-backup
    - name: Create a recovery cluster from the object store
      try:
        - script:
            content: |
              helm upgrade \
                --install \
                --namespace $NAMESPACE \
                --values ./11-recovery_object_store_cluster.yaml \
                --wait \
                recovery-object-store ../../
        - assert:
            file: ./11-recovery_object_store_cluster-assert.yaml
      catch:
        - describe:
            apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
        - podLogs:
            selector: cnpg.io/cluster=recovery-object-store-paradedb
    - name: Verify the data on the object store recovery cluster exists
      try:
        - apply:
            file: 12-data_test.yaml
        - assert:
            file: 12-data_test-assert.yaml
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
            name: data-test-object-store
        - podLogs:
            selector: batch.kubernetes.io/job-name=data-test-object-store
    - name: Verify pg_search is preloaded on the recovery cluster (cnpg#10840)
      timeouts:
        apply: 1s
        assert: 1m
      try:
        - apply:
            file: 13-recovery_shared_preload_test.yaml
        - assert:
            file: 13-recovery_shared_preload_test-assert.yaml
      catch:
        - describe:
            apiVersion: batch/v1
            kind: Job
            name: shared-preload-test-backup-pitr
        - podLogs:
            selector: batch.kubernetes.io/job-name=shared-preload-test-backup-pitr
    - name: Cleanup
      try:
        - script:
            content: |
              helm uninstall --namespace $NAMESPACE paradedb
              helm uninstall --namespace $NAMESPACE recovery-backup
              helm uninstall --namespace $NAMESPACE recovery-object-store
