##
# Recovery directly from the barman object store with a named PITR target. Bootstraps from the
# source cluster's archive (serverName `paradedb`) and replays WAL up to the `no-bad-table` restore
# point created in 06, so the pre-restore-point table is recovered but the post-restore-point one is
# not. object_store (not backup) recovery is used because that is how ParadeDB Cloud restores, and
# because a named target with a CNPG Backup object additionally requires a backupID.
type: paradedb
mode: recovery
cluster:
  # Single instance: this case only needs to prove a named PITR target reaches CNPG and stops at the
  # right point, so keep the extra footprint on the kind/MinIO CI runner minimal.
  instances: 1
  storage:
    size: 256Mi

recovery:
  method: object_store
  # serverName of the source cluster, i.e. its name in the object store.
  clusterName: "paradedb"
  pitrTarget:
    name: "no-bad-table"
  provider: s3
  endpointURL: "https://minio.minio.svc.cluster.local"
  endpointCA:
    name: kube-root-ca.crt
    key: ca.crt
  wal:
    encryption: ""
  data:
    encryption: ""
  s3:
    bucket: "mybucket"
    path: "/paradedb/v1"
    accessKey: "minio"
    secretKey: "minio123"
    region: "local"
  scheduledBackups: []
  retentionPolicy: "30d"

backups:
  enabled: true
  provider: s3
  endpointURL: "https://minio.minio.svc.cluster.local"
  endpointCA:
    name: kube-root-ca.crt
    key: ca.crt
  wal:
    encryption: ""
  data:
    encryption: ""
  s3:
    bucket: "mybucket"
    path: "/paradedb/v2"
    accessKey: "minio"
    secretKey: "minio123"
    region: "local"
  scheduledBackups: []
  retentionPolicy: "30d"
